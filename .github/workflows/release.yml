name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: download binaries from CI workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            CI_RUN_ID="$(gh api repos/${{ github.repository }}/actions/workflows/ci.yml/runs \
              --jq '.workflow_runs[] | select(.head_sha=="'"${GITHUB_SHA}"'") | select(.name=="CI") | select(.conclusion=="success") | .id' \
              | head -n 1)"
            if [ -n "$CI_RUN_ID" ]; then
              break
            fi
            echo "Waiting for CI success run for ${TAG} (${GITHUB_SHA}), attempt ${attempt}/5..."
            sleep 15
          done
          if [ -z "$CI_RUN_ID" ]; then
            echo "No successful CI run found for ${TAG} (${GITHUB_SHA})." >&2
            exit 1
          fi
          gh run download "$CI_RUN_ID" --name "prx-${TAG}" --dir .

      - name: checksums
        run: |
          sha256sum prx-darwin-amd64 prx-darwin-arm64 prx-linux-amd64 prx-linux-arm64 > checksums.txt

      - name: publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" prx-* checksums.txt --clobber
          else
            gh release create "$TAG" \
              prx-darwin-amd64 prx-darwin-arm64 prx-linux-amd64 prx-linux-arm64 checksums.txt \
              --title "$TAG" \
              --notes "Release $TAG"
          fi
