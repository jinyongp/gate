name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: gofmt
        id: gofmt
        run: scripts/dev/fmt-check.sh
      - name: vet
        id: vet
        run: scripts/dev/vet.sh
      - name: golangci-lint
        id: golangci_lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
      - name: govulncheck
        id: govulncheck
        run: scripts/dev/vuln.sh
      - name: scripts
        id: scripts
        run: scripts/dev/check-scripts.sh
      - name: test
        id: test
        run: scripts/dev/cover.sh
      - name: job summary
        if: always()
        run: bash .github/scripts/check-summary.sh
        env:
          RUNNER_OS_NAME: ${{ matrix.os }}
          GOFMT_OUTCOME: ${{ steps.gofmt.outcome }}
          VET_OUTCOME: ${{ steps.vet.outcome }}
          GOLANGCI_LINT_OUTCOME: ${{ steps.golangci_lint.outcome }}
          GOVULNCHECK_OUTCOME: ${{ steps.govulncheck.outcome }}
          SCRIPTS_OUTCOME: ${{ steps.scripts.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}

  build:
    needs: [check]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: detect release tag
        id: release_tag
        run: bash .github/scripts/detect-release-tag.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: build
        id: build
        run: bash .github/scripts/build-release-artifacts.sh "${{ steps.release_tag.outputs.tag }}"
      - id: upload_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prx-${{ github.sha }}
          path: |
            prx-darwin-amd64
            prx-darwin-arm64
            prx-linux-amd64
            prx-linux-arm64
      - name: checksums
        id: checksums
        if: steps.release_tag.outputs.tag != ''
        run: bash .github/scripts/checksums.sh
      - name: publish release
        id: publish_release
        if: steps.release_tag.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-release.sh "${{ steps.release_tag.outputs.tag }}"
      - name: job summary
        if: always()
        run: bash .github/scripts/build-summary.sh
        env:
          BUILD_VERSION: ${{ steps.build.outputs.version || 'not built' }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          TAG_TYPE: ${{ steps.release_tag.outputs.type }}
          TAG_TARGET: ${{ steps.release_tag.outputs.target }}
          RELEASE_STATUS: ${{ steps.release_tag.outputs.release }}
          DETECT_TAG_OUTCOME: ${{ steps.release_tag.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          UPLOAD_ARTIFACT_OUTCOME: ${{ steps.upload_artifact.outcome }}
          CHECKSUMS_OUTCOME: ${{ steps.checksums.outcome }}
          PUBLISH_RELEASE_OUTCOME: ${{ steps.publish_release.outcome }}
