name: Check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: gofmt
        id: gofmt
        run: scripts/dev/fmt-check.sh
      - name: vet
        id: vet
        run: scripts/dev/vet.sh
      - name: golangci-lint
        id: golangci_lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
      - name: govulncheck
        id: govulncheck
        run: scripts/dev/vuln.sh
      - name: scripts
        id: scripts
        run: scripts/dev/check-scripts.sh
      - name: test
        id: test
        run: scripts/dev/cover.sh
      - name: job summary
        if: always()
        run: bash .github/scripts/check-summary.sh
        env:
          RUNNER_OS_NAME: ${{ matrix.os }}
          GOFMT_OUTCOME: ${{ steps.gofmt.outcome }}
          VET_OUTCOME: ${{ steps.vet.outcome }}
          GOLANGCI_LINT_OUTCOME: ${{ steps.golangci_lint.outcome }}
          GOVULNCHECK_OUTCOME: ${{ steps.govulncheck.outcome }}
          SCRIPTS_OUTCOME: ${{ steps.scripts.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
